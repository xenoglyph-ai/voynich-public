name: Voynich
description: >-
  SKELETON. 16 dimensions for medieval manuscript illustration analysis.
  This public skeleton file contains the dimension *names* and *category
  groupings* that are disclosed in the preprint (see §3.1, Appendix A) but
  NOT the `prompt` strings themselves, which are covered by a pending US
  provisional patent application (filed March 2026) and withheld per §3.2
  of the preprint. This file is provided so that external researchers can
  reproduce the *structure* of the Voynich lens and fill in their own prompt
  descriptors against any CLIP-family vision-language encoder — this is
  exactly the lens-specificity control that §5.6 of the preprint recommends
  for anyone who wants to verify that the section signal is a property of
  the manuscript rather than of any particular lens. To request the full
  production lens under a research-use agreement, see the contact section
  of the companion repository README.
author: Xenoglyph Core (public skeleton)
created_date: "2026-04-03"
